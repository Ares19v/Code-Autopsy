# ══════════════════════════════════════════════════════════════════════════════
# Code Autopsy — Training Configuration
# ══════════════════════════════════════════════════════════════════════════════

model:
  base_model: "Qwen/Qwen2.5-Coder-7B-Instruct"
  max_seq_length: 512
  trust_remote_code: true
  # Set to false to use the merged model instead of adapter
  use_adapter: true

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

data:
  train_file: "data/processed/train.jsonl"
  val_file: "data/processed/val.jsonl"
  test_file: "data/processed/test.jsonl"
  dataset_text_field: "text"

training:
  output_dir: "./checkpoints"
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16      # effective batch = 16
  gradient_checkpointing: true
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  # Precision
  fp16: false
  bf16: true
  # Logging & saving
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 250
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  # Optimization
  optim: "adamw_8bit"
  dataloader_num_workers: 0
  remove_unused_columns: false
  report_to: "none"

wandb:
  project: "code-autopsy"
  entity: null        # set via WANDB_ENTITY env var or leave null for default

paths:
  adapter_output: "./adapter"
  merged_output: "./merged_model"
